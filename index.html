<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joelheira Ortopédica — Alívio Real, Movimento de Volta</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:    #0D1F3C;
      --azul2:   #1A3A6E;
      --dourado: #C9943A;
      --dourado2:#E8B55A;
      --branco:  #F5F7FA;
      --cinza:   #7A8899;
      --verde:   #2ECC8B;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--branco);
      color: var(--azul);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── HERO ─────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul2) 100%);
      color: #fff;
      padding: 60px 24px 70px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 30%, rgba(201,148,58,.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .badge {
      display: inline-block;
      background: var(--dourado);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 8.5vw, 56px);
      font-weight: 800;
      line-height: 1.15;           /* ← Aumentado */
      margin-bottom: 20px;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero h1 span { color: var(--dourado2); }
    .hero p {
      font-size: clamp(16px, 4vw, 19px);
      color: rgba(255,255,255,.85);
      max-width: 520px;
      margin: 0 auto 32px;
      line-height: 1.55;           /* ← Melhorado */
    }

    .hero-img {
      width: min(320px, 90%);
      margin: 0 auto 32px;
      display: block;
      filter: drop-shadow(0 16px 40px rgba(0,0,0,.45));
      animation: float 3.6s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* Botão */
    .btn {
      display: inline-block;
      background: var(--verde);
      color: #fff;
      font-size: 17.5px;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(46,204,139,.45);
      transition: all .18s;
    }
    .btn:hover  { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(46,204,139,.55); }

    .hero-sub {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,.6);
      letter-spacing: .04em;
    }

    /* Outras seções - pequenos ajustes de espaçamento */
    h2 {
      line-height: 1.2;
    }

    .dor p, .beneficios > p, .como > p {
      line-height: 1.65;
    }

    /* Ajustes mobile */
    @media (max-width: 480px) {
      .hero {
        padding: 50px 20px 60px;
      }
      .hero h1 {
        line-height: 1.12;
      }
    }
  </style>
</head>
<body>
